<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>HALT Animal Card Generator</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // When GitHub Pages returns a 404 for a client-side route,
      // this page encodes the path into the query string and
      // redirects to index.html, which decodes it back.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') + '/?/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
